<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 助手 · 语音 · 文字</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div>
            <p class="sidebar-eyebrow">语音 · 文字 · AI</p>
            <h1>AI 助手</h1>
          </div>
          <button type="button" class="new-conversation-btn" id="newConversationBtn">新建</button>
        </div>
        <div class="conversation-list" id="conversationList" aria-label="历史会话"></div>
        <div class="conversation-empty hidden" id="conversationEmpty">暂无历史会话</div>
      </aside>

      <main class="chat-shell">
        <header class="chat-header">
          <div class="chat-title-wrap">
            <h2 id="conversationTitle">新对话</h2>
            <p class="subtitle">语音转写 · 文字输入</p>
          </div>
          <button type="button" class="edit-title-btn" id="editTitleBtn">重命名</button>
        </header>

        <section class="messages" id="messages" aria-live="polite">
          <div class="messages-placeholder" id="placeholder">
            <p>说点什么或输入文字开始对话</p>
          </div>
        </section>

        <section class="input-area">
          <div class="input-row">
            <button type="button" class="mic-btn" id="micBtn" aria-label="语音输入" title="语音输入">
              <span class="mic-btn-icon"></span>
            </button>
            <textarea class="text-input" id="textInput" placeholder="输入消息…" rows="1" maxlength="4000"></textarea>
            <button type="button" class="send-btn" id="sendBtn" aria-label="发送" title="发送">
              <span class="send-btn-icon"></span>
            </button>
          </div>
          <p class="input-hint" id="inputHint"></p>
        </section>
      </main>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
