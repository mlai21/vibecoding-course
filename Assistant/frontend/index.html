<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>相遇地点助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-badge" aria-hidden="true">语音 · AI</div>
        <h1>相遇地点助手</h1>
        <p class="subtitle">说出你和朋友的位置，为你推荐合适的见面地点</p>
      </header>

      <main class="main">
        <section class="record-section">
          <div class="record-card">
            <div class="record-hint">
              <div class="mic-visual" aria-hidden="true">
                <span class="mic-ring"></span>
                <span class="mic-core"></span>
              </div>
              <p class="hint-main">点击下方按钮开始录音，用语音描述你和朋友各自的位置</p>
              <p class="hint-example">例如：「我在北京西单，朋友在国贸」</p>
            </div>

            <button type="button" class="record-btn" id="recordBtn" aria-label="开始录音">
              <span class="record-btn-icon"></span>
              <span class="record-btn-text">开始录音</span>
            </button>
          </div>
        </section>

        <section class="status-section" id="statusSection" aria-live="polite">
          <div class="status-content" id="statusContent"></div>
        </section>

        <section class="result-section" id="resultSection" hidden>
          <div class="result-header">
            <span class="result-badge">推荐结果</span>
            <h2 class="sr-only">播放推荐语音</h2>
          </div>
          <div class="result-audio">
            <audio id="resultAudio" controls></audio>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
